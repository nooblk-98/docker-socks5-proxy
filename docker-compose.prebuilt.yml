services:
  socks5:
    image: lahiru98s/docker-socks5-proxy:latest
    container_name: socks5-server
    ports:
      - "${SOCKS5_PORT:-54178}:1080"
    environment:
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASS=${PROXY_PASS:-}
      - PROXY_USERS=${PROXY_USERS:-}
      - ALLOWED_CIDR=${ALLOWED_CIDR:-}
      - BLOCKED_DESTINATIONS=${BLOCKED_DESTINATIONS:-}
      - UDP_ENABLED=${UDP_ENABLED:-false}
      - IPV6_ENABLED=${IPV6_ENABLED:-false}
      - DNS_SERVER=${DNS_SERVER:-}
      - TIMEOUT_CONNECT=${TIMEOUT_CONNECT:-30}
      - TIMEOUT_NEGOTIATE=${TIMEOUT_NEGOTIATE:-30}
      - TIMEOUT_IO=${TIMEOUT_IO:-86400}
      - TOR_ENABLED=${TOR_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-normal}

    # volumes:
    #   - ./users.txt:/etc/proxy-users.txt:ro

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    sysctls:
      net.core.somaxconn: 32768
      net.ipv4.tcp_tw_reuse: 1
      net.ipv4.tcp_fin_timeout: 15
      net.ipv4.tcp_keepalive_time: 300

    stop_grace_period: 10s
    restart: unless-stopped
