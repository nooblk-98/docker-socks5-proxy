# Dante SOCKS5 server configuration
# This file is overwritten at container startup by entrypoint.sh.
# Edit environment variables in .env to control behaviour.

logoutput: stderr

internal: 0.0.0.0 port = 1080
external: eth0

clientmethod: none
socksmethod: none

user.privileged: root
user.notprivileged: nobody

timeout.connect: 30
timeout.negotiate: 30
timeout.io: 86400

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: connect disconnect error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    protocol: tcp
    log: connect disconnect error
}
